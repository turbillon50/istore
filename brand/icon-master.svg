<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background squircle gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <!-- Blue chip gradient -->
    <linearGradient id="chip" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <!-- Specular highlight -->
    <radialGradient id="spec" cx="0.32" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <clipPath id="sq">
      <path d="M256 24C92 24 24 92 24 256s68 232 232 232 232-68 232-232S420 24 256 24Z"/>
    </clipPath>
  </defs>

  <!-- Base squircle -->
  <path d="M256 24C92 24 24 92 24 256s68 232 232 232 232-68 232-232S420 24 256 24Z" fill="url(#bg)"/>
  <g clip-path="url(#sq)">
    <!-- inner ambient glow -->
    <circle cx="256" cy="220" r="200" fill="url(#glow)"/>
    <!-- top sheen -->
    <ellipse cx="200" cy="40" rx="260" ry="150" fill="#ffffff" opacity="0.04"/>
  </g>

  <!-- Hairline border -->
  <path d="M256 24C92 24 24 92 24 256s68 232 232 232 232-68 232-232S420 24 256 24Z"
        fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>

  <!-- Glow under chip -->
  <rect x="168" y="150" width="176" height="232" rx="52" fill="#2563EB" opacity="0.45" filter="url(#soft)"/>

  <!-- Phone chip -->
  <g>
    <rect x="170" y="146" width="172" height="220" rx="50" fill="url(#chip)"/>
    <rect x="170" y="146" width="172" height="220" rx="50" fill="url(#spec)"/>
    <rect x="170.5" y="146.5" width="171" height="219" rx="49.5" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>

    <!-- Speaker slit -->
    <rect x="238" y="170" width="36" height="6" rx="3" fill="#ffffff" opacity="0.85"/>

    <!-- Wrench / repair glyph -->
    <g stroke="#ffffff" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.96">
      <path d="M232 214c-14 6-20 22-13 36 6 13 22 18 35 13l34 70c5 10 17 14 27 9s14-17 9-27l-34-70c8-12 7-29-4-39-8-8-20-10-30-6l16 22-9 18-20 4-13-19Z"/>
    </g>
    <!-- Home indicator -->
    <rect x="232" y="342" width="48" height="6" rx="3" fill="#ffffff" opacity="0.7"/>
  </g>
</svg>
