  <text x="290" y="300" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="700" fill="url(#txt)">iStore <tspan fill="#3B82F6">Pro</tspan></text>
  <text x="294" y="356" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="500" fill="#A1A1AA">Sistema inteligente para talleres de reparación</text>

